name: Sync QingRex.LoonKissSurge

on:
  workflow_dispatch:        # 手动触发
  # schedule:
    # - cron: '0 0 * * *'     # 每天零点自动运行
  push:
    branches:
      - main                # main 分支推送时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 赋予 Action 推送权限

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Sync and Rename Logic
      run: |
        # 1. 环境准备
        # 创建 Sgmodule 存放最终文件，temp_lpx 存放下载的对比文件
        mkdir -p Sgmodule
        mkdir -p temp_lpx
        
        # 定义镜像源
        mirrors=("git.botrna.site" "git.boio.me" "git.repcz.link")

        # 2. 拉取 Surge 原始资源 (QingRex)
        echo "--- 正在拉取原始 Surge 模块 ---"
        git clone --depth=1 --filter=blob:none --sparse https://github.com/QingRex/LoonKissSurge.git source
        cd source && git sparse-checkout set Surge && cd ..
        
        # 将原始文件拷贝到目标目录
        find source/Surge -maxdepth 1 -name "*.sgmodule" -exec cp {} Sgmodule/ \;

