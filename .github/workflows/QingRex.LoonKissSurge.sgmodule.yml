          "https://kelee.one/Tool/Loon/Lpx/FollowRSS_checkin.lpx"
        )

        # 4. 遍历处理改名
        for url in "${URLS[@]}"; do
          lpx_filename=$(basename "$url")
          lpx_base_name="${lpx_filename%.*}"
          tmp_file="temp_lpx/$lpx_filename"
          download_successful=false
          
          # 下载逻辑
          if [[ "$url" == *"kelee.one"* ]]; then
            for mirror in "${mirrors[@]}"; do
              download_url="${url/https:\/\/kelee.one/https:\/\/$mirror\/kelee.one}"
              http_code=$(curl -A "Surge iOS/3500" --connect-timeout 15 -L -s -w "%{http_code}" -o "$tmp_file" "$download_url")
              if [ "$http_code" -eq 200 ] && [ -s "$tmp_file" ]; then
                download_successful=true
                break
              fi
            done
          else
            http_code=$(curl -A "Surge iOS/3500" --connect-timeout 15 -L -s -w "%{http_code}" -o "$tmp_file" "$url")
            [ "$http_code" -eq 200 ] && [ -s "$tmp_file" ] && download_successful=true
          fi

          if [ "$download_successful" = false ]; then
            echo "✘ 跳过下载失败文件: $url"
            continue
          fi

          # 提取下载文件中的 Icon ID
          lpx_icon_raw=$(sed 's/\r//g' "$tmp_file" | grep -m1 -i "icon" | sed -E 's/.*=[[:space:]]*(.*)/\1/' | tr -d '[:cntrl:]' | tr -d ' ')
          lpx_icon_id=$(basename "$lpx_icon_raw" | cut -d'?' -f1 | sed 's/\.png//g; s/\.jpg//g; s/\.jpeg//g; s/\.webp//g' | tr '[:upper:]' '[:lower:]')

          if [ -n "$lpx_icon_id" ]; then
            # 在本地 Sgmodule 目录寻找具有相同 Icon ID 的文件
            for sg in Sgmodule/*.sgmodule; do
              [ -e "$sg" ] || continue
              sg_icon_raw=$(sed 's/\r//g' "$sg" | grep -m1 -i "icon" | sed -E 's/.*=[[:space:]]*(.*)/\1/' | tr -d '[:cntrl:]' | tr -d ' ')
              sg_icon_id=$(basename "$sg_icon_raw" | cut -d'?' -f1 | sed 's/\.png//g; s/\.jpg//g; s/\.jpeg//g; s/\.webp//g' | tr '[:upper:]' '[:lower:]')

              if [ "$lpx_icon_id" = "$sg_icon_id" ]; then
                current_sg_name=$(basename "$sg")
                new_sg_name="${lpx_base_name}.sgmodule"
                if [ "$current_sg_name" != "$new_sg_name" ]; then
                  echo "✓ 匹配并改名: $current_sg_name -> $new_sg_name"
                  mv "$sg" "Sgmodule/$new_sg_name"
                  break
                fi
              fi
            done
          fi
        done

        # 5. 清理临时数据
        rm -rf temp_lpx source
        echo "✓ 处理完成。匹配成功的已改名，未匹配的保持原名。"

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Sgmodule/
        # 检查是否有改动，有则提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Sync QingRex.LoonKissSurge $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi