name: QingRex.LoonKissSurge.sgmodule

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Sync and Rename
      run: |
        # 1. 准备目录
        # 先清理旧的 Sgmodule 目录（可选，取决于你是否想保留手动添加的文件）
        # rm -rf Sgmodule
        mkdir -p Sgmodule
        mkdir -p temp_lpx

        # 2. 同步 QingRex Surge 根目录 sgmodule
        # 使用 sparse-checkout 只下载根目录下的 .sgmodule，忽略子目录
        git clone --depth=1 --filter=blob:none --sparse https://github.com/QingRex/LoonKissSurge.git source
        cd source
        git sparse-checkout set "Surge/*.sgmodule"
        cd ..

        # 将下载的文件拷贝到工作目录
        cp source/Surge/*.sgmodule Sgmodule/ 2>/dev/null || true

