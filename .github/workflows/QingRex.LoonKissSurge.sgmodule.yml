name: QingRex.LoonKissSurge sgmodule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

    # 1️⃣ 拉取你的仓库
    - name: Checkout Target Repo
      uses: actions/checkout@v4
      with:
        repository: sooyaaabo/Egern
        path: Egern

    # 2️⃣ 拉取 QingRex 仓库（只 Surge 目录）
    - name: Checkout Source Repo
      uses: actions/checkout@v4
      with:
        repository: QingRex/LoonKissSurge
        path: source
        sparse-checkout: |
          Surge
        sparse-checkout-cone-mode: false

    # 3️⃣ 智能同步（新增 + 内容不同才覆盖）
    - name: Smart Sync sgmodule Files
      run: |
        mkdir -p Egern/Sgmodule

        for file in source/Surge/*.sgmodule; do
          [ -e "$file" ] || continue
          filename=$(basename "$file")

          if [ ! -f "Egern/Sgmodule/$filename" ]; then
            echo "Adding $filename"
            cp "$file" "Egern/Sgmodule/$filename"
          else
            if ! cmp -s "$file" "Egern/Sgmodule/$filename"; then
              echo "Updating $filename"
              cp "$file" "Egern/Sgmodule/$filename"
            else
              echo "No change $filename"
            fi
          fi
        done

    # 4️⃣ 有变化才提交
    - name: Commit & Push
      run: |
        cd Egern
        if [[ -n $(git status -s) ]]; then
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Auto Smart Sync Surge $(date +'%Y-%m-%d %H:%M')"
          git push
        else
          echo "No changes."
        fi
