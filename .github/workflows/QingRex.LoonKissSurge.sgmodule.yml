        # 4. 开始遍历处理
        for url in "${URLS[@]}"; do
          echo "正在处理：$url"
          
          # 获取 LPX/Plugin 文件名（不含后缀）
          lpx_filename=$(basename "$url")
          lpx_base_name="${lpx_filename%.*}"
          
          # 下载临时文件进行 icon 提取
          tmp_file="temp_lpx/$lpx_filename"
          curl -A "Surge iOS/3450" -L -s "$url" -o "$tmp_file"
          
          # 提取并清洗 LPX 的 icon
          lpx_icon=$(grep -m1 '^#!icon=' "$tmp_file" | cut -d'=' -f2 | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          lpx_icon=${lpx_icon%.png}
          lpx_icon=${lpx_icon%.jpg}

          if [ -n "$lpx_icon" ]; then
            # 遍历 Sgmodule 文件夹下的所有 sgmodule
            for sg in Sgmodule/*.sgmodule; do
              [ -e "$sg" ] || continue
              
              # 提取并清洗 SG 的 icon
              sg_icon=$(grep -m1 '^#!icon=' "$sg" | cut -d'=' -f2 | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')
              sg_icon=${sg_icon%.png}
              sg_icon=${sg_icon%.jpg}

              # 如果 icon 相同且文件名不同，则重命名
              if [ "$lpx_icon" = "$sg_icon" ]; then
                current_sg_name=$(basename "$sg")
                new_sg_name="${lpx_base_name}.sgmodule"
                
                if [ "$current_sg_name" != "$new_sg_name" ]; then
                  echo "匹配成功！Icon: $lpx_icon"
                  echo "更名: $current_sg_name -> $new_sg_name"
                  mv "$sg" "Sgmodule/$new_sg_name"
                fi
              fi
            done
          else
            echo "跳过：$lpx_filename (未找到 icon)"
          fi
        done

        # 清理临时文件和克隆的源码
        rm -rf temp_lpx source

    - name: Commit & Push
      run: |
        if [[ -n $(git status -s) ]]; then
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Auto Sync & Smart Rename $(date +'%Y-%m-%d %H:%M')"
          git push
        else
          echo "没有检测到任何变化。"
        fi
