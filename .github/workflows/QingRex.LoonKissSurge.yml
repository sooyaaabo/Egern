        # 5. 执行匹配和改名
        echo "--- 开始匹配标题并转换文件名 ---"
        for url in "${URLS[@]}"; do
          lpx_filename=$(basename "$url")
          target_base_name="${lpx_filename%.*}"
          tmp_file="temp_lpx/$lpx_filename"
          
          download_successful=false
          if [[ "$url" == *"kelee.one"* ]]; then
            for mirror in "${mirrors[@]}"; do
              download_url="${url/https:\/\/kelee.one/https:\/\/$mirror\/kelee.one}"
              http_code=$(curl -A "Surge iOS/3500" --connect-timeout 15 -L -s -w "%{http_code}" -o "$tmp_file" "$download_url")
              [ "$http_code" -eq 200 ] && [ -s "$tmp_file" ] && download_successful=true && break
            done
          else
            http_code=$(curl -A "Surge iOS/3500" --connect-timeout 15 -L -s -w "%{http_code}" -o "$tmp_file" "$url")
            [ "$http_code" -eq 200 ] && [ -s "$tmp_file" ] && download_successful=true
          fi

          if [ "$download_successful" = false ]; then continue; fi

          # 提取 .lpx 文件内部的标题名
          lpx_title=$(grep -m1 "^#!name=" "$tmp_file" | cut -d'=' -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr -d '\r')

          if [ -n "$lpx_title" ]; then
            for sg in Sgmodule/*.sgmodule; do
              [ -f "$sg" ] || continue
              
              sg_title=$(grep -m1 "^#!name=" "$sg" | cut -d'=' -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr -d '\r')

              if [ "$lpx_title" = "$sg_title" ]; then
                current_name=$(basename "$sg")
                new_name="${target_base_name}.sgmodule"
                
                if [ "$current_name" != "$new_name" ]; then
                  echo "✔ 匹配成功: [$lpx_title] ($current_name ➜ $new_name)"
                  mv "$sg" "Sgmodule/$new_name"
                  break
                fi
              fi
            done
          fi
        done

        # 6. 清理临时文件
        rm -rf temp_lpx source
        echo "任务完成。"

    - name: Commit and Push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Sgmodule/
        
        # 设置时区为东八区
        export TZ='Asia/Shanghai'
        CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Sync QingRex.LoonKissSurge $CURRENT_TIME"
          git push
        fi