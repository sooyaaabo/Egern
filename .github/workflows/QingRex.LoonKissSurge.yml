        rm -rf Sgmodule
        mkdir -p Sgmodule
        mkdir -p temp_lpx
        mirrors=("git.botrna.site" "git.103516.xyz" "git.repcz.link")

        # 2. 克隆原始 QingRex/LoonKissSurge 仓库
        echo "--- 正在拉取原始资源 ---"
        git clone --depth=1 --filter=blob:none --sparse https://github.com/QingRex/LoonKissSurge.git source
        cd source && git sparse-checkout set Surge && cd ..

        # 3. 预拷贝：严格文件名黑名单过滤
        echo "--- 开始拷贝并过滤特定文件 ---"
        EXCLUDE_LIST=(
          "DNS防泄露.sgmodule"
          "Google重定向.sgmodule"
          "Spotify歌词翻译.sgmodule"
          "TikTok多地区解锁.sgmodule"
          "拦截HTTPDNS.sgmodule"
          "爱奇艺视频去广告.sgmodule"
          "百度搜索网页去广告.sgmodule"
          "书香门第每日签到.sgmodule"
          "贴吧去广告.sgmodule"
          "王者营地去广告.sgmodule"
          "掌上穿越火线去广告.sgmodule"
          "微博国际版去广告.sgmodule"
          "云闪付去广告.sgmodule"
        )

        for file in source/Surge/*.sgmodule; do
          [ -f "$file" ] || continue
          filename=$(basename "$file")
          
          skip=false
          for excluded in "${EXCLUDE_LIST[@]}"; do
            if [ "$filename" = "$excluded" ]; then
              echo "✖ 严格排除匹配: $filename"
              skip=true
              break
            fi
          done
          
          if [ "$skip" = false ]; then
            cp "$file" Sgmodule/
          fi
        done

